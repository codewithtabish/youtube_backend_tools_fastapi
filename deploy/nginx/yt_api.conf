# ================================================
# Nginx config for yt_api.codewithtabish.com
# ================================================

server {
    listen 80;
    server_name ytapi.codewithtabish.com;

    # Increase timeout for video download feature
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # Proxy all requests to your FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # Important headers for FastAPI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large files (for future video upload if needed)
        client_max_body_size 100M;
    }
}


